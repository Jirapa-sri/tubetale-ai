<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>TubeTale AI</title>
    <script>
      // Prevent theme flash before React mounts
      (function () {
        try {
          var t = localStorage.getItem('tubetale-theme')
            || localStorage.getItem('insight-observer-theme')
            || 'night'
          document.documentElement.setAttribute('data-theme', t === 'day' ? 'day' : 'night')
          document.documentElement.classList.toggle('dark', t !== 'day')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
